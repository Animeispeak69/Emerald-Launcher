<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Emerald Launcher</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <h1>Emerald Launcher</h1>
      </header>

      <section id="controls">
        <div class="leftControls">
          <div class="types" id="typeButtons"></div>
          <div class="actions">
            <button id="refresh">Refresh versions</button>
          </div>
        </div>

        <div class="rightControls">
          <div id="accountArea">
            <button id="msLogin">Sign in with Microsoft</button>
            <div id="accountsList"></div>
          </div>

          <div id="javaArea">
            <h4>Java Runtimes</h4>
            <div id="javaList"></div>
            <button id="addJavaBtn">Add Java...</button>
          </div>

          <div id="modArea">
            <h4>Mod Browser (Modrinth)</h4>
            <input id="modSearchInput" placeholder="Search mods or packs" />
            <button id="modSearchBtn">Search</button>
            <div id="modResults"></div>
          </div>

        </div>
      </section>

      <section id="versionArea">
        <div id="versionsHorizontal" class="horizontalList"></div>
      </section>

      <section id="details">
        <h2 id="selectedTitle">No version selected</h2>
        <div id="detailBody"></div>
      </section>

      <footer>
        <small>Shows official versions from Mojang. For launching you'll need a valid Minecraft account token and a Java runtime. Mod downloads use Modrinth API.</small>
      </footer>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
